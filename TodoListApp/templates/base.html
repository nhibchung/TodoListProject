<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Todo App{% endblock %}</title>
    <style>
        :root{
            --bg:#f4f7fb; --card:#ffffff; --accent:#0d6efd; --muted:#6c757d; --danger:#c0392b; --text:#1f2933;
        }
        html,body{height:100%;}
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); }
        .container { max-width: 1024px; margin: 0 auto; padding: 1rem; }
        header { background: linear-gradient(90deg,var(--accent),#0369a1); color: white; }
        header .bar { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1rem; }
        header .brand { display:flex; align-items:center; gap:.75rem; }
        header h1 { margin:0; font-size:1.125rem; font-weight:600; }
        nav a { color: rgba(255,255,255,0.95); margin-right: 1rem; text-decoration: none; font-weight:500; }
        main { padding: 2rem 0; }
        footer { padding: 1rem 0; background: transparent; color: var(--muted); font-size: 0.9rem; text-align:center; }
        .card { background: var(--card); border-radius: 10px; box-shadow: 0 6px 20px rgba(31,41,51,0.06); padding: 1.25rem; }

        /* Buttons */
        .button, .btn { display: inline-block; padding: 0.5rem 0.9rem; background: var(--accent); color: white; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; }
        .button.secondary, .btn.secondary { background: #6c757d; }
        .button.danger, .btn.danger { background: var(--danger); }
        .button.success, .btn.success { background: #28a745; }
        .button.success:hover, .btn.success:hover { background: #218838; }
        a.button { line-height:1; }

        /* Table defaults */
        table { width:100%; border-collapse: separate; border-spacing: 0 0.6rem; }
        th, td { padding: 0.9rem 1rem; text-align:left; vertical-align:top; }
        thead th { text-transform:uppercase; font-size:0.78rem; letter-spacing:0.06em; color:var(--muted); font-weight:600; }
        tbody tr { background: var(--card); border-radius:8px; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
        .completed { text-decoration: line-through; color: #8b949e; }

        /* Responsive */
        @media (max-width:720px){
            .container{padding:0.75rem}
            table, thead, tbody, th, td, tr { display:block; }
            thead { display:none; }
            tbody tr { margin-bottom: 0.75rem; }
            td { padding: 0.6rem; }
            .actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <div class="bar">
                <div class="brand">
                    <h1>{% block header %}Todo App{% endblock %}</h1>
                </div>
                <nav>
                    <a href="{% url 'home' %}">Home</a>
                    <a href="{% url 'todo_list' %}">Todos</a>
                </nav>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer>
        <div class="container">
            <p>Built with Django.</p>
        </div>
    </footer>
</body>
</html>
