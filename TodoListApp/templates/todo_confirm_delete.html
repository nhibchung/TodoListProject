{% extends 'base.html' %}

{% block title %}Delete Todo - Todo App{% endblock %}

{% block header %}Delete Todo{% endblock %}

{% block content %}
    <div class="card">
        <p>Are you sure you want to delete "{{ object.title }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="button danger">Yes, delete</button>
            <a class="button secondary" href="{% url 'todo_list' %}">Cancel</a>
        </form>
    </div>
{% endblock %}
